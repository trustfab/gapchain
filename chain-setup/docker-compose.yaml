    container_name: peer0.htxnongsan.gapchain.vn
    networks:
      - gapchain-network
    depends_on:
      - orderer.gapchain.vn
      - couchdb0.htxnongsan.gapchain.vn

  # CouchDB for HTX Nong San
  couchdb0.htxnongsan.gapchain.vn:
