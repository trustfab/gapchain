version: "3.8"

networks:
  gapchain-network:
    name: gapchain-network
    driver: bridge

volumes:
  orderer.gapchain.vn:
  peer0.platform.gapchain.vn:
  peer0.htxnongsan.gapchain.vn:
  peer0.chicucbvtv.gapchain.vn:
  peer0.nppxanh.gapchain.vn:

services:
  # Orderer Node
  orderer.gapchain.vn:
    image: hyperledger/fabric-orderer:3.1.1
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererOrgMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # TLS settings
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Cluster settings
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Operations settings
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9440
      # Admin settings
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9441
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CLIENTAUTHREQUIRED=true
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./organizations/ordererOrganizations/gapchain.vn/orderers/orderer.gapchain.vn/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/gapchain.vn/orderers/orderer.gapchain.vn/tls/:/var/hyperledger/orderer/tls
      - orderer.gapchain.vn:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 9440:9440
      - 9441:9441
    container_name: orderer.gapchain.vn
    networks:
      - gapchain-network

  # Platform Organization Peer
  peer0.platform.gapchain.vn:
    image: hyperledger/fabric-peer:3.1.1
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=gapchain-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.platform.gapchain.vn
      - CORE_PEER_ADDRESS=peer0.platform.gapchain.vn:7051
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.platform.gapchain.vn:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_ORGLEADER=true
      - CORE_PEER_GOSSIP_USELEADERELECTION=false
      - CORE_PEER_GOSSIP_STATE_ENABLED=false
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.platform.gapchain.vn:7051
      - CORE_PEER_DELIVERYCLIENT_BLOCKGOSSIPENABLED=false
      - CORE_PEER_LOCALMSPID=PlatformOrgMSP
      - CORE_OPERATIONS_ENDPOINT=0.0.0.0:9443
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0.platform.gapchain.vn:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    extra_hosts:
      - "orderer.gapchain.vn:host-gateway"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/platform.gapchain.vn/peers/peer0.platform.gapchain.vn/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/platform.gapchain.vn/peers/peer0.platform.gapchain.vn/tls:/etc/hyperledger/fabric/tls
      - ./organizations:/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - peer0.platform.gapchain.vn:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - 7051:7051
      - 9443:9443
    container_name: peer0.platform.gapchain.vn
    networks:
      - gapchain-network
    depends_on:
      - orderer.gapchain.vn
      - couchdb0.platform.gapchain.vn

  # CouchDB for Platform
  couchdb0.platform.gapchain.vn:
    container_name: couchdb0.platform.gapchain.vn
    image: couchdb:3.3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5984:5984
    networks:
      - gapchain-network

